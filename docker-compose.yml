services:
  backend:
    container_name: budget-backend
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/budget.db
      ALLOWED_ORIGINS: "*"
    volumes:
      - db_data:/app/data
    networks:
      - web
      - internal
    restart: unless-stopped

  frontend:
    container_name: budget-frontend
    build: ./frontend
    depends_on:
      - backend
    networks:
      - web
      - internal
    restart: unless-stopped

volumes:
  db_data:

networks:
  web:
    external: true
  internal:
