services:
  backend:
    container_name: budget-backend
    build: ./backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/budget.db
      ALLOWED_ORIGINS: "https://hbudget.duckdns.org,http://localhost"
      OLLAMA_URL: "http://ollama:11434"
    volumes:
      - db_data:/app/data
    networks:
      - web
      - internal
    restart: unless-stopped

  frontend:
    container_name: budget-frontend
    build: ./frontend
    depends_on:
      - backend
    networks:
      - web
      - internal
    restart: unless-stopped

  ollama:
    container_name: budget-ollama
    image: ollama/ollama
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    restart: unless-stopped

volumes:
  db_data:
  ollama_data:

networks:
  web:
    external: true
  internal:
