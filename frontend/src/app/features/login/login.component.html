<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold text-indigo-600 text-center mb-6">💰 Budget</h1>

    <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input
          type="email"
          [ngModel]="email()"
          (ngModelChange)="email.set($event)"
          name="email"
          required
          autocomplete="email"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input
          type="password"
          [ngModel]="password()"
          (ngModelChange)="password.set($event)"
          name="password"
          required
          autocomplete="current-password"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
        />
      </div>

      @if (success()) {
        <p class="text-green-600 text-sm text-center">{{ success() }}</p>
      }

      @if (error()) {
        <p class="text-red-500 text-sm text-center">{{ error() }}</p>
      }

      @if (showResend()) {
        @if (resendSent()) {
          <p class="text-green-600 text-sm text-center">Verification email resent — check your inbox.</p>
        } @else {
          <p class="text-sm text-center">
            <button type="button" (click)="resendVerification()"
              class="text-indigo-600 hover:underline font-medium">
              Resend verification email
            </button>
          </p>
        }
      }

      <button
        type="submit"
        [disabled]="loading()"
        class="w-full bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50"
      >
        {{ loading() ? 'Signing in…' : 'Sign in' }}
      </button>
    </form>

    <p class="text-sm text-gray-500 text-center mt-4">
      Don't have an account?
      <a routerLink="/register" class="text-indigo-600 hover:underline font-medium">Register</a>
    </p>
  </div>
</div>
