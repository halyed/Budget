<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-md w-full max-w-sm p-8">
    <h1 class="text-2xl font-bold text-indigo-600 text-center mb-6">💰 Budget</h1>

    @if (submitted()) {
      <div class="text-center">
        <div class="text-indigo-600 mb-4">
          <svg class="w-12 h-12 mx-auto mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <p class="font-semibold text-gray-800">Check your inbox!</p>
        </div>
        <p class="text-sm text-gray-500 mb-4">
          We sent a verification link to <strong>{{ email() }}</strong>.<br>
          Click the link to activate your account.
        </p>
        <a routerLink="/login" class="text-indigo-600 hover:underline text-sm font-medium">Back to sign in</a>
      </div>
    } @else {
      <h2 class="text-lg font-semibold text-gray-700 text-center mb-6">Create an account</h2>

      <form (ngSubmit)="onSubmit()" #f="ngForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input
            type="email"
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
            required
            autocomplete="email"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <input
            type="password"
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
            required
            autocomplete="new-password"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Confirm Password</label>
          <input
            type="password"
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            name="confirmPassword"
            required
            autocomplete="new-password"
            class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"
          />
        </div>

        @if (error()) {
          <p class="text-red-500 text-sm text-center">{{ error() }}</p>
        }

        <button
          type="submit"
          [disabled]="loading()"
          class="w-full bg-indigo-600 text-white rounded-lg py-2 text-sm font-semibold hover:bg-indigo-700 transition-colors disabled:opacity-50"
        >
          {{ loading() ? 'Creating account…' : 'Create account' }}
        </button>
      </form>

      <p class="text-sm text-gray-500 text-center mt-4">
        Already have an account?
        <a routerLink="/login" class="text-indigo-600 hover:underline font-medium">Sign in</a>
      </p>
    }
  </div>
</div>
